version: "3.9"

services:
  # -------------------- Spark Master --------------------
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      - iceberg_net

  # -------------------- Spark Worker 1 --------------------
  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker-1
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      - iceberg_net

  # -------------------- Spark Worker 2 --------------------
  spark-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker-2
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      - iceberg_net

  # -------------------- Spark Thrift Server --------------------
  spark-thrift:
    build: 
      context: .
      dockerfile: Dockerfile.spark
    user: root
    container_name: spark-thrift
    depends_on:
      - spark-master
      - minio
    ports:
      - "10000:10000"
      - "4040:4040"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password123
      - AWS_REGION=us-east-1
    networks:
      - iceberg_net
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --deploy-mode client
      --conf spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
      --conf spark.sql.catalog.school_catalog=org.apache.iceberg.spark.SparkCatalog
      --conf spark.sql.catalog.school_catalog.type=hadoop
      --conf spark.sql.catalog.school_catalog.warehouse=s3a://cygnet/iceberg_data/
      --conf spark.sql.catalog.netflix_catalog=org.apache.iceberg.spark.SparkCatalog
      --conf spark.sql.catalog.netflix_catalog.type=hadoop
      --conf spark.sql.catalog.netflix_catalog.warehouse=s3a://netflix/iceberg_data/
      --conf spark.sql.catalog.formula1_catalog=org.apache.iceberg.spark.SparkCatalog
      --conf spark.sql.catalog.formula1_catalog.type=hadoop
      --conf spark.sql.catalog.formula1_catalog.warehouse=s3a://formula1/iceberg_data/
      --conf spark.sql.defaultCatalog=formula1_catalog
      --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
      --conf spark.hadoop.fs.s3a.access.key=admin
      --conf spark.hadoop.fs.s3a.secret.key=password123
      --conf spark.hadoop.fs.s3a.path.style.access=true
      --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false
      --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      --conf spark.hive.server2.thrift.bind.host=0.0.0.0
      --conf spark.hive.server2.transport.mode=binary
      --class org.apache.spark.sql.hive.thriftserver.HiveThriftServer2
      spark-internal

  # -------------------- dbt --------------------
  dbt:
    build: ./dbt
    container_name: dbt
    depends_on:
      - spark-thrift
    volumes:
      - ./dbt:/usr/app/dbt
      - ./.dbt:/root/.dbt
    tty: true
    networks:
      - iceberg_net

  # -------------------- MinIO --------------------
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    volumes:
      - minio-data:/data
    networks:
      - iceberg_net

  # -------------------- Dremio --------------------
  dremio:
    image: dremio/dremio-oss:latest
    container_name: dremio
    environment:
      - DREMIO_JAVA_SERVER_EXTRA_OPTS=-Dpaths.dist=file:///opt/dremio/data/dist
    volumes:
      - ./dremio_data:/opt/dremio/data
    ports:
      - "9047:9047"
      - "31010:31010"
    networks:
      - iceberg_net
    depends_on:
      - minio

  # -------------------- Streamlit UI --------------------
  streamlit-ui:
    build: ./streamlit_app
    container_name: streamlit-ui
    ports:
      - "8501:8501"
    depends_on:
      - spark-thrift
      - dremio
    volumes:
      - ./streamlit_app:/app
      - ./dbt:/dbt
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - iceberg_net

# --- TOP-LEVEL NETWORKS AND VOLUMES ---
networks:
  iceberg_net:
    driver: bridge

volumes:
  minio-data: